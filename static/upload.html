<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MarketCopilot Upload</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 24px;
      background: #f6f7fb;
      color: #1f2937;
    }

    .card {
      background: #ffffff;
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 10px 30px rgba(0,0,0,.08);
      max-width: 520px;
      margin: 0 auto;
    }

    h1 {
      font-size: 22px;
      margin: 0 0 10px;
    }

    p {
      color: #6b7280;
      line-height: 1.45;
      margin: 8px 0 16px;
    }

    label {
      display: block;
      margin-top: 14px;
      font-weight: 700;
      font-size: 14px;
    }

    select, input, button {
      width: 100%;
      box-sizing: border-box;
      margin-top: 8px;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #d1d5db;
      font-size: 16px;
    }

    button {
      margin-top: 18px;
      background: #2563eb;
      color: white;
      font-weight: 700;
      border: 0;
      cursor: pointer;
    }

    button:disabled {
      opacity: .55;
      cursor: not-allowed;
    }

    .status {
      margin-top: 14px;
      font-size: 14px;
      white-space: pre-wrap;
      color: #374151;
    }

    .hint {
      font-size: 13px;
      color: #6b7280;
      background: #f3f4f6;
      padding: 10px 12px;
      border-radius: 12px;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>📤 MarketCopilot Upload</h1>
    <p>Загрузите большой файл для оптимизации поставок Ozon. Файл уйдёт напрямую на сервер и Яндекс.Диск, без лимита Telegram.</p>

    <label for="stage">Что загружаем?</label>
    <select id="stage">
      <option value="locality">1/3 — Локальность / Переплата</option>
      <option value="sales">2/3 — Продажи</option>
      <option value="stocks">3/3 — Остатки</option>
    </select>

    <label for="file">Файл</label>
    <input id="file" type="file" accept=".xlsx,.xls,.csv" />

    <div class="hint">
      Поддерживаются файлы: .xlsx, .xls, .csv. Максимальный размер зависит от настройки MAX_UPLOAD_MB в Railway.
    </div>

    <button id="uploadBtn">Загрузить файл</button>

    <div id="status" class="status"></div>
  </div>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();

  const statusEl = document.getElementById("status");
  const uploadBtn = document.getElementById("uploadBtn");

  function getUserId() {
    return tg.initDataUnsafe && tg.initDataUnsafe.user
      ? String(tg.initDataUnsafe.user.id)
      : "unknown";
  }

  uploadBtn.addEventListener("click", async () => {
    const fileInput = document.getElementById("file");
    const stage = document.getElementById("stage").value;

    if (!fileInput.files.length) {
      statusEl.textContent = "Выберите файл.";
      return;
    }

    const file = fileInput.files[0];

    const formData = new FormData();
    formData.append("file", file);
    formData.append("stage", stage);
    formData.append("user_id", getUserId());

    uploadBtn.disabled = true;
    statusEl.textContent = "⏳ Загружаю файл...";

    try {
      const response = await fetch("/upload", {
        method: "POST",
        body: formData
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.detail || "Ошибка загрузки");
      }

      statusEl.textContent = "✅ Файл загружен. Передаю данные боту...";

      tg.sendData(JSON.stringify(data));

      setTimeout(() => {
        tg.close();
      }, 800);

    } catch (error) {
      statusEl.textContent = "❌ " + error.message;
      uploadBtn.disabled = false;
    }
  });
</script>
</body>
</html>
