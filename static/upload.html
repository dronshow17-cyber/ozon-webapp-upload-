<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarketCopilot Upload</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f5f7;
            margin: 0;
            padding: 20px;
        }

        .card {
            max-width: 520px;
            margin: auto;
            background: white;
            padding: 24px;
            border-radius: 18px;
            box-shadow: 0 8px 30px rgba(0,0,0,.08);
        }

        h1 {
            font-size: 28px;
            margin-bottom: 12px;
        }

        p {
            color: #666;
            line-height: 1.5;
        }

        label {
            display: block;
            margin-top: 18px;
            margin-bottom: 8px;
            font-weight: bold;
        }

        select,
        input[type=file] {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            margin-top: 24px;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: #2f6bff;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }

        #status {
            margin-top: 18px;
            font-weight: bold;
        }

        progress {
            width: 100%;
            height: 20px;
            margin-top: 12px;
        }
    </style>
</head>
<body>

<div class="card">

    <h1>📤 MarketCopilot Upload</h1>

    <p>
        Загрузите файл напрямую на сервер и Яндекс.Диск.
    </p>

    <label>Что загружаем?</label>

    <select id="step">
        <option value="1">1/3 — Локальность / Переплата</option>
        <option value="2">2/3 — Продажи</option>
        <option value="3">3/3 — Остатки</option>
    </select>

    <label>Файл</label>

    <input type="file" id="file">

    <button onclick="uploadFile()">
        Загрузить файл
    </button>

    <progress id="progress" value="0" max="100" style="display:none;"></progress>

    <div id="status"></div>

</div>

<script>

const tg = window.Telegram.WebApp;
tg.expand();

async function uploadFile() {

    const fileInput = document.getElementById("file");
    const file = fileInput.files[0];

    if (!file) {
        alert("Выберите файл");
        return;
    }

    const step = document.getElementById("step").value;

    const progress = document.getElementById("progress");
    const status = document.getElementById("status");

    progress.style.display = "block";
    progress.value = 0;

    status.innerText = "⏳ Загружаем файл...";

    const formData = new FormData();

    formData.append("file", file);
    formData.append("step", step);
    formData.append("user_id", tg.initDataUnsafe.user?.id || 0);

    const xhr = new XMLHttpRequest();

    xhr.open(
        "POST",
        "/upload",
        true
    );

    xhr.upload.onprogress = function(event) {

        if (event.lengthComputable) {

            const percent = Math.round(
                (event.loaded / event.total) * 100
            );

            progress.value = percent;

            status.innerText =
                "⏳ Загрузка: " + percent + "%";
        }
    };

    xhr.onload = function() {

        if (xhr.status === 200) {

            status.innerText =
                "✅ Файл успешно загружен";

            progress.value = 100;

            try {

                const response =
                    JSON.parse(xhr.responseText);

                tg.sendData(JSON.stringify(response));

            } catch(e) {}

        } else {

            status.innerText =
                "❌ Ошибка загрузки";
        }
    };

    xhr.onerror = function() {

        status.innerText =
            "❌ Ошибка сети";
    };

    xhr.send(formData);
}

</script>

</body>
</html>
