<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>MarketCopilot Upload</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      margin: 0;
      padding: 24px;
    }

    .card {
      max-width: 440px;
      margin: 0 auto;
      background: white;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 24px;
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-top: 16px;
      margin-bottom: 8px;
      font-weight: 600;
    }

    select, input {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #d1d5db;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      border: none;
      border-radius: 14px;
      background: #3867f4;
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #processBtn {
      background: #16a34a;
      display: none;
    }

    progress {
      width: 100%;
      margin-top: 18px;
      display: none;
    }

    #status {
      margin-top: 16px;
      font-size: 15px;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>📤 MarketCopilot Upload</h1>

    <p>Загрузите 3 файла. Большие CSV будут сжаты в ZIP и сохранены на Яндекс.Диск.</p>

    <label>Что загружаем?</label>

    <select id="stage">
      <option value="locality">1/3 — Локализация</option>
      <option value="sales">2/3 — Продажи</option>
      <option value="stocks">3/3 — Остатки</option>
    </select>

    <label>Файл</label>

    <input id="fileInput" type="file" />

    <button id="uploadBtn" onclick="uploadFile()">
      Загрузить файл
    </button>

    <progress id="progress"></progress>

    <div id="status"></div>

    <button id="processBtn" onclick="processFiles()">
      Сформировать готовый файл
    </button>
  </div>

  <script>
    const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;

    if (tg) {
      tg.ready();
      tg.expand();
    }

    function getUserId() {
      if (tg && tg.initDataUnsafe && tg.initDataUnsafe.user && tg.initDataUnsafe.user.id) {
        return String(tg.initDataUnsafe.user.id);
      }

      return "0";
    }

    function goToNextStage(currentStage) {
      const stageSelect = document.getElementById("stage");

      if (currentStage === "locality") {
        stageSelect.value = "sales";
        return;
      }

      if (currentStage === "sales") {
        stageSelect.value = "stocks";
        return;
      }
    }

    async function uploadFile() {
      const fileInput = document.getElementById("fileInput");
      const stageSelect = document.getElementById("stage");
      const stage = stageSelect.value;
      const status = document.getElementById("status");
      const uploadBtn = document.getElementById("uploadBtn");
      const progress = document.getElementById("progress");
      const processBtn = document.getElementById("processBtn");

      if (!fileInput.files.length) {
        status.innerText = "Выберите файл";
        return;
      }

      const userId = getUserId();

      if (userId === "0") {
        status.innerText = "Ошибка: WebApp открыт не из Telegram, user_id не найден";
        return;
      }

      const file = fileInput.files[0];

      const formData = new FormData();
      formData.append("file", file);
      formData.append("stage", stage);
      formData.append("user_id", userId);

      status.innerText = "Загружаем файл...";
      uploadBtn.disabled = true;
      processBtn.style.display = "none";
      progress.style.display = "block";
      progress.removeAttribute("value");

      try {
        const response = await fetch("/upload", {
          method: "POST",
          body: formData
        });

        const result = await response.json();

        if (result.success) {
          status.innerHTML = "✅ Файл успешно загружен";

          fileInput.value = "";

          if (stage === "stocks") {
            processBtn.style.display = "block";
            status.innerHTML = "✅ Остатки загружены. Теперь можно сформировать готовый файл.";
          } else {
            goToNextStage(stage);
          }

        } else {
          status.innerText = "Ошибка загрузки: " + (result.error || "unknown");
        }

      } catch (error) {
        status.innerText = "Ошибка запроса: " + error.message;

      } finally {
        uploadBtn.disabled = false;
        progress.style.display = "none";
      }
    }

    async function processFiles() {
      const status = document.getElementById("status");
      const processBtn = document.getElementById("processBtn");
      const userId = getUserId();

      if (userId === "0") {
        status.innerText = "Ошибка: user_id не найден";
        return;
      }

      const formData = new FormData();
      formData.append("user_id", userId);

      status.innerText = "Формируем готовый файл и отправляем в Telegram...";
      processBtn.disabled = true;

      try {
        const response = await fetch("/process", {
          method: "POST",
          body: formData
        });

        const result = await response.json();

        if (result.success) {
          status.innerHTML = "✅ Готовый файл отправлен в Telegram";
        } else {
          status.innerText = "Ошибка формирования: " + (result.error || "unknown");
        }

      } catch (error) {
        status.innerText = "Ошибка запроса: " + error.message;

      } finally {
        processBtn.disabled = false;
      }
    }
  </script>
</body>
</html>
