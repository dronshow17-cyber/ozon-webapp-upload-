<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>MarketCopilot Upload</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background: #f3f4f6; margin: 0; padding: 24px; }
    .card { max-width: 440px; margin: 0 auto; background: white; border-radius: 18px; padding: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
    h1 { font-size: 24px; margin-bottom: 16px; }
    label { display: block; margin-top: 16px; margin-bottom: 8px; font-weight: 600; }
    select, input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #d1d5db; box-sizing: border-box; }
    button { width: 100%; margin-top: 20px; padding: 14px; border: none; border-radius: 14px; background: #3867f4; color: white; font-size: 16px; font-weight: 700; cursor: pointer; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    progress { width: 100%; margin-top: 18px; display: none; }
    #status { margin-top: 16px; font-size: 15px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>📤 MarketCopilot Upload</h1>
    <p>Загрузите большой файл. После загрузки Mini App вернёт данные в бота, и бот продолжит текущий шаг.</p>

    <label>Что загружаем?</label>
    <select id="stage">
      <option value="locality">1/3 — Локализация</option>
      <option value="sales">2/3 — Продажи</option>
      <option value="stocks">3/3 — Остатки</option>
    </select>

    <label>Файл</label>
    <input id="fileInput" type="file" />

    <button id="uploadBtn" onclick="uploadFile()">Загрузить файл</button>
    <progress id="progress"></progress>
    <div id="status"></div>
  </div>

  <script>
    const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;

    if (tg) {
      tg.ready();
      tg.expand();
    }

    function getUrlParam(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name);
    }

    function getUserId() {
      try {
        if (tg && tg.initDataUnsafe && tg.initDataUnsafe.user && tg.initDataUnsafe.user.id) {
          return String(tg.initDataUnsafe.user.id);
        }

        const urlUserId = getUrlParam("user_id");
        if (urlUserId) {
          return String(urlUserId);
        }

        return "0";
      } catch (e) {
        return "0";
      }
    }

    function applyStageFromUrl() {
      const stageFromUrl = getUrlParam("stage");
      const stageSelect = document.getElementById("stage");

      if (["locality", "sales", "stocks"].includes(stageFromUrl)) {
        stageSelect.value = stageFromUrl;
      }
    }

    applyStageFromUrl();

    async function uploadFile() {
      const fileInput = document.getElementById("fileInput");
      const stageSelect = document.getElementById("stage");
      const stage = stageSelect.value;
      const status = document.getElementById("status");
      const uploadBtn = document.getElementById("uploadBtn");
      const progress = document.getElementById("progress");

      if (!fileInput.files.length) {
        status.innerText = "Выберите файл";
        return;
      }

      const userId = getUserId();
      if (userId === "0") {
        status.innerText = "Ошибка: WebApp открыт не из Telegram, user_id не найден";
        return;
      }

      const file = fileInput.files[0];
      const formData = new FormData();
      formData.append("file", file);
      formData.append("stage", stage);
      formData.append("user_id", userId);

      status.innerText = "Загружаем файл...";
      uploadBtn.disabled = true;
      progress.style.display = "block";
      progress.removeAttribute("value");

      try {
        const response = await fetch("/upload", { method: "POST", body: formData });
        const result = await response.json();

        if (!result.success) {
          status.innerText = "Ошибка загрузки: " + (result.error || "unknown");
          return;
        }

        status.innerHTML = "✅ Файл загружен. Передаю данные боту...";

        const payload = {
          type: "yandex_disk_upload",
          stage: stage,
          remote_path: result.remote_path,
          filename: file.name
        };

        if (tg && tg.sendData) {
          tg.sendData(JSON.stringify(payload));
          setTimeout(function () { tg.close(); }, 300);
        } else {
          status.innerText = "Файл загружен, но Telegram WebApp API недоступен. Закройте окно и продолжите в боте.";
        }

      } catch (error) {
        status.innerText = "Ошибка запроса: " + error.message;
      } finally {
        uploadBtn.disabled = false;
        progress.style.display = "none";
      }
    }
  </script>
</body>
</html>
