<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>MarketCopilot Upload</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      margin: 0;
      padding: 24px;
    }

    .card {
      max-width: 440px;
      margin: 0 auto;
      background: white;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 24px;
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-top: 16px;
      margin-bottom: 8px;
      font-weight: 600;
    }

    select, input {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #d1d5db;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      border: none;
      border-radius: 14px;
      background: #3867f4;
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #processBtn {
      background: #16a34a;
      display: none;
    }

    progress {
      width: 100%;
      margin-top: 18px;
      display: none;
    }

    #status {
      margin-top: 16px;
      font-size: 15px;
    }

    a {
      color: #2563eb;
      font-weight: 700;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>📤 MarketCopilot Upload</h1>

    <p>Загрузите файлы напрямую в Яндекс.Диск.</p>

    <label>Что загружаем?</label>

    <select id="stage">
      <option value="locality">1/3 — Локализация</option>
      <option value="sales">2/3 — Продажи</option>
      <option value="stocks">3/3 — Остатки</option>
    </select>

    <label>Файл</label>

    <input id="fileInput" type="file" />

    <button id="uploadBtn" onclick="uploadFile()">
      Загрузить файл
    </button>

    <progress id="progress" value="0" max="100"></progress>

    <div id="status"></div>

    <button id="processBtn" onclick="processFiles()">
      Сформировать готовый файл
    </button>
  </div>

  <script>
    async function uploadFile() {
      const fileInput = document.getElementById("fileInput");
      const stage = document.getElementById("stage").value;
      const status = document.getElementById("status");
      const uploadBtn = document.getElementById("uploadBtn");
      const progress = document.getElementById("progress");
      const processBtn = document.getElementById("processBtn");

      if (!fileInput.files.length) {
        status.innerText = "Выберите файл";
        return;
      }

      const file = fileInput.files[0];

      status.innerText = "Получаем ссылку для загрузки...";
      uploadBtn.disabled = true;
      processBtn.style.display = "none";
      progress.style.display = "block";
      progress.removeAttribute("value");

      try {
        const formData = new FormData();
        formData.append("filename", file.name);
        formData.append("stage", stage);
        formData.append("user_id", "0");

        const urlResponse = await fetch("/get-upload-url", {
          method: "POST",
          body: formData
        });

        const urlResult = await urlResponse.json();

        if (!urlResult.success) {
          throw new Error(urlResult.error || "Не удалось получить upload URL");
        }

        status.innerText = "Загружаем файл напрямую в Яндекс.Диск...";

        const uploadResponse = await fetch(urlResult.upload_url, {
          method: "PUT",
          body: file
        });

        if (!uploadResponse.ok) {
          throw new Error("Ошибка Яндекс.Диска: " + uploadResponse.status);
        }

        status.innerHTML = "✅ Файл успешно загружен";

        if (stage === "stocks") {
          processBtn.style.display = "block";
        }

      } catch (error) {
        status.innerText = "Ошибка запроса: " + error.message;

      } finally {
        uploadBtn.disabled = false;
        progress.style.display = "none";
      }
    }

    async function processFiles() {
      const status = document.getElementById("status");
      const processBtn = document.getElementById("processBtn");

      status.innerText = "Формируем готовый файл...";
      processBtn.disabled = true;

      try {
        const response = await fetch("/process", {
          method: "POST"
        });

        const result = await response.json();

        if (result.success) {
          status.innerHTML =
            `✅ Готовый файл сформирован<br>
             <a href="${result.download_url}" target="_blank">
               Скачать готовый файл
             </a>`;
        } else {
          status.innerText =
            "Ошибка формирования: " + (result.error || "unknown");
        }

      } catch (error) {
        status.innerText = "Ошибка запроса: " + error.message;

      } finally {
        processBtn.disabled = false;
      }
    }
  </script>
</body>
</html>
