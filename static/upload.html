<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MarketCopilot Upload</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
    font-family: Arial,sans-serif;
    background:#f3f5f7;
    margin:0;
    padding:20px;
}

.card{
    max-width:520px;
    margin:auto;
    background:white;
    border-radius:20px;
    padding:24px;
    box-shadow:0 10px 30px rgba(0,0,0,.1);
}

h1{
    margin-top:0;
    font-size:24px;
}

p{
    color:#555;
}

select,
input[type=file]{
    width:100%;
    margin-top:10px;
    margin-bottom:20px;
    padding:14px;
    border-radius:12px;
    border:1px solid #ccc;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:14px;
    background:#356af0;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}

#status{
    margin-top:20px;
    font-size:16px;
}

progress{
    width:100%;
    height:18px;
    margin-top:20px;
}
</style>
</head>

<body>

<div class="card">

<h1>📤 MarketCopilot Upload</h1>

<p>
Загрузите файл напрямую на сервер и Яндекс.Диск.
</p>

<label>Что загружаем?</label>

<select id="stage">
    <option value="locality">1/3 — Локальность / Переплата</option>
    <option value="sales">2/3 — Продажи</option>
    <option value="stocks">3/3 — Остатки</option>
</select>

<label>Файл</label>

<input type="file" id="fileInput">

<button onclick="uploadFile()">
    Загрузить файл
</button>

<progress id="progressBar" value="0" max="100" style="display:none;"></progress>

<div id="status"></div>

</div>

<script>

async function uploadFile(){

    const fileInput = document.getElementById("fileInput");
    const stage = document.getElementById("stage").value;
    const status = document.getElementById("status");
    const progressBar = document.getElementById("progressBar");

    if(fileInput.files.length === 0){
        alert("Выберите файл");
        return;
    }

    const file = fileInput.files[0];

    const formData = new FormData();

    formData.append("file", file);
    formData.append("stage", stage);

    status.innerHTML = "⏳ Загружаем...";
    progressBar.style.display = "block";

    try{

        const xhr = new XMLHttpRequest();

        xhr.upload.addEventListener("progress", function(e){

            if(e.lengthComputable){

                const percent = (e.loaded / e.total) * 100;

                progressBar.value = percent;
            }
        });

        xhr.onreadystatechange = function(){

            if(xhr.readyState === 4){

                if(xhr.status === 200){

                    status.innerHTML = "✅ Файл успешно загружен";

                    progressBar.value = 100;

                }else{

                    status.innerHTML = "❌ Ошибка загрузки";

                    console.log(xhr.responseText);
                }
            }
        };

        xhr.open("POST", "/upload");

        xhr.send(formData);

    }catch(err){

        console.log(err);

        status.innerHTML = "❌ Ошибка";
    }
}

</script>

</body>
</html>
