<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MarketCopilot Upload</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 24px;
      background: #f6f7fb;
      color: #1f2937;
    }

    .card {
      background: #ffffff;
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 10px 30px rgba(0,0,0,.08);
      max-width: 520px;
      margin: 0 auto;
    }

    h1 {
      font-size: 22px;
      margin: 0 0 10px;
    }

    p {
      color: #6b7280;
      line-height: 1.45;
      margin: 8px 0 16px;
    }

    label {
      display: block;
      margin-top: 14px;
      font-weight: 700;
      font-size: 14px;
    }

    select, input, button {
      width: 100%;
      box-sizing: border-box;
      margin-top: 8px;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #d1d5db;
      font-size: 16px;
    }

    button {
      margin-top: 18px;
      background: #2563eb;
      color: white;
      font-weight: 700;
      border: 0;
      cursor: pointer;
    }

    button:disabled {
      opacity: .55;
      cursor: not-allowed;
    }

    .status {
      margin-top: 14px;
      font-size: 14px;
      white-space: pre-wrap;
      color: #374151;
    }

    .hint {
      font-size: 13px;
      color: #6b7280;
      background: #f3f4f6;
      padding: 10px 12px;
      border-radius: 12px;
      margin-top: 12px;
    }

    .progress-wrap {
      width: 100%;
      background: #e5e7eb;
      border-radius: 999px;
      height: 10px;
      margin-top: 14px;
      overflow: hidden;
      display: none;
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      background: #2563eb;
      transition: width .2s ease;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>📤 MarketCopilot Upload</h1>

    <p>
      Загрузите большой файл для оптимизации поставок Ozon.
      Файл уйдёт напрямую на сервер и Яндекс.Диск, без лимита Telegram.
    </p>

    <label for="stage">Что загружаем?</label>
    <select id="stage">
      <option value="locality">1/3 — Локальность / Переплата</option>
      <option value="sales">2/3 — Продажи</option>
      <option value="stocks">3/3 — Остатки</option>
    </select>

    <label for="file">Файл</label>
    <input id="file" type="file" accept=".xlsx,.xls,.csv" />

    <div class="hint">
      Поддерживаются файлы: .xlsx, .xls, .csv.
      Максимальный размер зависит от настройки MAX_UPLOAD_MB в Railway.
    </div>

    <button id="uploadBtn">Загрузить файл</button>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <div id="status" class="status"></div>
  </div>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();

  const statusEl = document.getElementById("status");
  const uploadBtn = document.getElementById("uploadBtn");
  const progressWrap = document.getElementById("progressWrap");
  const progressBar = document.getElementById("progressBar");

  function getUserId() {
    return tg.initDataUnsafe && tg.initDataUnsafe.user
      ? String(tg.initDataUnsafe.user.id)
      : "unknown";
  }

  function setStatus(text) {
    statusEl.textContent = text;
  }

  function setProgress(percent) {
    progressWrap.style.display = "block";
    progressBar.style.width = percent + "%";
  }

  function uploadWithProgress(url, formData, timeoutMs = 180000) {
    return new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();

      const timeout = setTimeout(() => {
        xhr.abort();
        reject(new Error("Загрузка заняла слишком много времени. Проверь Railway logs и Яндекс.Диск."));
      }, timeoutMs);

      xhr.open("POST", url, true);

      xhr.upload.onprogress = function(event) {
        if (event.lengthComputable) {
          const percent = Math.round((event.loaded / event.total) * 100);
          setProgress(percent);
          setStatus("⏳ Загружаю файл... " + percent + "%");
        } else {
          setStatus("⏳ Загружаю файл...");
        }
      };

      xhr.onload = function() {
        clearTimeout(timeout);

        let data = {};
        try {
          data = JSON.parse(xhr.responseText || "{}");
        } catch (e) {
          reject(new Error("Сервер вернул не JSON: " + xhr.responseText));
          return;
        }

        if (xhr.status >= 200 && xhr.status < 300) {
          resolve(data);
        } else {
          reject(new Error(data.detail || ("Ошибка сервера: " + xhr.status)));
        }
      };

      xhr.onerror = function() {
        clearTimeout(timeout);
        reject(new Error("Ошибка сети при загрузке файла."));
      };

      xhr.onabort = function() {
        clearTimeout(timeout);
        reject(new Error("Загрузка была прервана."));
      };

      xhr.send(formData);
    });
  }

  uploadBtn.addEventListener("click", async () => {
    const fileInput = document.getElementById("file");
    const stage = document.getElementById("stage").value;

    if (!fileInput.files.length) {
      setStatus("Выберите файл.");
      return;
    }

    const file = fileInput.files[0];

    const formData = new FormData();
    formData.append("file", file);
    formData.append("stage", stage);
    formData.append("user_id", getUserId());

    uploadBtn.disabled = true;
    setProgress(0);
    setStatus("⏳ Начинаю загрузку...");

    try {
      const data = await uploadWithProgress("/upload", formData, 180000);

      setProgress(100);
      setStatus("✅ Файл загружен. Передаю данные боту...");

      tg.sendData(JSON.stringify(data));

      setTimeout(() => {
        tg.close();
      }, 800);

    } catch (error) {
      setStatus("❌ " + error.message);
      uploadBtn.disabled = false;
    }
  });
</script>
</body>
</html>
